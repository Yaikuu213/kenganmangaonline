name: Build and Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5 # <--- La clé du succès est ici !
      - name: Build Extension
        run: gradle :src:en:kenganmanga:assembleRelease
      - name: Prepare Distribution Folder
        run: |
          mkdir -p ../dist/apk
          find . -name "*.apk" -exec cp {} ../dist/apk/eu.kanade.tachiyomi.extension.en.kenganmanga-v1.apk \;
          echo '[{"name":"Kengan Manga Online","pkg":"eu.kanade.tachiyomi.extension.en.kenganmanga","apk":"apk/eu.kanade.tachiyomi.extension.en.kenganmanga-v1.apk","lang":"en","code":7,"version":"1.2.0"}]' > ../dist/index.min.json
      - name: Deploy to Branch Repo
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: repo
          FOLDER: ../dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "🚀 Victoire ! Extension v1.2.0"
