name: Build and Deploy

on:
  push:
    branches: [ main ] # On surveille la branche main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Extension
        run: |
          # Si gradlew est absent, on utilise gradle directement
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleRelease
          else
            gradle assembleRelease
          fi

      - name: Prepare Distribution Folder
        run: |
          mkdir -p ../dist/apk
          find . -name "*.apk" -exec cp {} ../dist/apk/eu.kanade.tachiyomi.extension.en.kenganmanga-v1.apk \;
          
          cat << 'EOF' > ../dist/index.min.json
          [
            {
              "name": "Kengan Manga Online",
              "pkg": "eu.kanade.tachiyomi.extension.en.kenganmanga",
              "apk": "apk/eu.kanade.tachiyomi.extension.en.kenganmanga-v1.apk",
              "lang": "en",
              "code": 5,
              "version": "1.2.0",
              "sources": [
                {
                  "name": "Kengan Manga Online",
                  "id": "7038148785664273523",
                  "lang": "en",
                  "baseUrl": "https://w15.kengan-manga.com"
                }
              ]
            }
          ]
          EOF
          cp ../dist/index.min.json ../dist/index.json

      - name: Deploy to Branch Repo
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: repo
          FOLDER: ../dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "🚀 Auto-deploy: v1.2.0"
